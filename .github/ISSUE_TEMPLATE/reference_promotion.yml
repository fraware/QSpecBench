name: Reference promotion
description: Propose promoting a benchmark to a scoped reference level
title: "[Promotion] "
labels: ["reference", "governance"]
body:
  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark ID or path
      description: e.g. benchmarks/equivalence/cnot_self_inverse_cancellation/
    validations:
      required: true
  - type: dropdown
    id: target_maturity
    attributes:
      label: Target maturity
      options:
        - reference_scaffold
        - reference_contract
        - reference_artifact
        - reference_claim
    validations:
      required: true
  - type: textarea
    id: obligations
    attributes:
      label: Obligations checked (list)
      description: Which claim_scope.required_obligations are fully proved?
    validations:
      required: true
  - type: textarea
    id: gaps
    attributes:
      label: Remaining gaps
      description: What remains in proved_scope.unproved_obligations?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Promotion checklist
      options:
        - label: qspecbench validate passes
        - label: qspecbench claim-diff reviewed
        - label: trust_boundary updated honestly
        - label: formal_claims bind theorems to obligations
        - label: CI evidence checks pass
