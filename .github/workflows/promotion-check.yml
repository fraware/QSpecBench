name: Promotion check

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "schema/**"
      - "tools/qspecbench/**"

jobs:
  promotion-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: qspecbench validate benchmarks/
      - run: git fetch origin "${{ github.base_ref }}"
      - run: python -m pytest tests/test_infrastructure_b.py tests/test_claim_diff.py tests/test_lean_evidence.py -q
      - name: Claim diff on changed benchmarks
        run: |
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path
          base = os.environ.get("GITHUB_BASE_REF", "main")
          out = subprocess.check_output(
              ["git", "diff", "--name-only", f"origin/{base}...HEAD"],
              text=True,
          )
          for line in out.splitlines():
              if line.endswith("spec.yaml") and "benchmarks/" in line:
                  claim = Path(line).parent
                  print(f"=== claim-diff {claim} ===")
                  subprocess.run(["qspecbench", "claim-diff", str(claim)], check=False)
          PY
