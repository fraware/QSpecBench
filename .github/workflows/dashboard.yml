name: Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run qspecbench dashboard benchmarks/ --out docs/status.md
