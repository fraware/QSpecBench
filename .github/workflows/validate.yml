name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean toolchain and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Fetch Mathlib cache
        run: |
          cd lean
          lake exe cache get || true

      - name: Build Lean proofs
        run: |
          cd lean
          lake build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen --extra dev

      - name: Export theorem elaborator types
        run: uv run python scripts/export_theorem_types.py > /dev/null
      - run: uv run qspecbench validate benchmarks/
      - run: uv run qspecbench bridge-metadata verify
      - run: uv run qspecbench bridge-codegen verify benchmarks/
      - run: uv run qspecbench dynamic-simulate benchmarks/algorithms/teleportation_preserves_state_up_to_pauli_correction --teleport-basis-check
      - run: uv run qspecbench check-evidence benchmarks/
      - run: uv run qspecbench dashboard benchmarks/ --out docs/status.md
      - name: Check dashboard drift
        run: git diff --exit-code docs/status.md
      - run: uv run pytest
      - name: Release bundle smoke
        run: |
          uv run qspecbench release-bundle benchmarks/equivalence/cnot_self_inverse_cancellation --out /tmp/qspecbench-smoke.tar.gz
          uv run qspecbench verify-release-bundle /tmp/qspecbench-smoke.tar.gz

  bridge:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/cnot_self_inverse_cancellation
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/hadamard_conjugates_x_to_z
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/single_qubit_gate_cancellation
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/qft_inverse_qft_small_instance
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/clifford_simplification_preserves_unitary
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/source_optimized_qasm_equivalence_small_instance
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/phase_polynomial_equivalence_small_instance
      - run: uv run qspecbench verify-bridge benchmarks/algorithms/teleportation_preserves_state_up_to_pauli_correction
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/rx_gate_equivalence_small_instance
      - run: uv run qspecbench verify-bridge benchmarks/algorithms/bell_state_preparation
      - run: uv run qspecbench verify-bridge benchmarks/algorithms/swap_from_three_cx
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/toffoli_decomposition_equivalence
      - run: uv run qspecbench verify-bridge benchmarks/equivalence/circuit_identity_after_layout
      - run: uv run qspecbench verify-bridge benchmarks/algorithms/qft_then_inverse_qft_identity_up_to_ordering

  ai_formalization:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean toolchain and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Build Lean proofs
        run: |
          cd lean
          lake exe cache get || true
          lake build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run qspecbench check-evidence benchmarks/ai_formalization/

  qcec:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean toolchain and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Build Lean proofs
        run: |
          cd lean
          lake exe cache get || true
          lake build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run qspecbench check-evidence benchmarks/equivalence/

  smt:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --extra dev
      - run: uv run qspecbench check-evidence benchmarks/qec/distance_certificate_small_css_code/
