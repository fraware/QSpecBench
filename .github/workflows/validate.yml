name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Fetch Mathlib cache
        run: |
          cd lean
          lake exe cache get || true

      - name: Build Lean proofs
        run: |
          cd lean
          lake build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -e ".[dev]"
      - run: qspecbench validate benchmarks/
      - run: qspecbench check-evidence benchmarks/equivalence/cnot_self_inverse_cancellation
      - run: qspecbench check-evidence benchmarks/
      - run: qspecbench dashboard benchmarks/ --out docs/status.md
      - run: pytest

  bridge:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: qspecbench verify-bridge benchmarks/equivalence/cnot_self_inverse_cancellation
      - run: qspecbench verify-bridge benchmarks/equivalence/hadamard_conjugates_x_to_z
      - run: qspecbench verify-bridge benchmarks/equivalence/single_qubit_gate_cancellation
      - run: qspecbench verify-bridge benchmarks/equivalence/qft_inverse_qft_small_instance
      - run: qspecbench verify-bridge benchmarks/equivalence/clifford_simplification_preserves_unitary
      - run: qspecbench verify-bridge benchmarks/equivalence/source_optimized_qasm_equivalence_small_instance
      - run: qspecbench verify-bridge benchmarks/equivalence/phase_polynomial_equivalence_small_instance
      - run: qspecbench verify-bridge benchmarks/algorithms/teleportation_preserves_state_up_to_pauli_correction
      - run: qspecbench verify-bridge benchmarks/equivalence/rx_gate_equivalence_small_instance
      - run: qspecbench verify-bridge benchmarks/algorithms/bell_state_preparation
      - run: qspecbench verify-bridge benchmarks/algorithms/swap_from_three_cx
      - run: qspecbench verify-bridge benchmarks/equivalence/toffoli_decomposition_equivalence
      - run: qspecbench verify-bridge benchmarks/equivalence/circuit_identity_after_layout
      - run: qspecbench verify-bridge benchmarks/algorithms/qft_then_inverse_qft_identity_up_to_ordering

  ai_formalization:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build Lean proofs
        run: |
          cd lean
          lake exe cache get || true
          lake build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: qspecbench check-evidence benchmarks/ai_formalization/

  qcec:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | bash -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build Lean proofs
        run: |
          cd lean
          lake exe cache get || true
          lake build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: qspecbench check-evidence benchmarks/equivalence/

  smt:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3
      - run: python -m pip install -e ".[dev]"
      - run: qspecbench check-evidence benchmarks/qec/distance_certificate_small_css_code/