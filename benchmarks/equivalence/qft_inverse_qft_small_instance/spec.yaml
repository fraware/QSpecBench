qspecbench_version: '0.2'
id: qft_inverse_qft_small_instance
title: QFT and inverse QFT are mutual inverses (small instance)
track: equivalence
domain: circuit_equivalence
claim_type: unitary_equivalence
difficulty: intermediate
informal_claim:
  statement: QFT and inverse QFT circuits are mutual inverses on a fixed two-qubit
    scaffold.
  source: null
  reference_key: null
semantic_level:
  primary: circuit
  secondary: []
objects:
- name: source
  type: circuit
  path: artifacts/source.qasm
  format: qasm3
  role: source
- name: target
  type: circuit
  path: artifacts/target.qasm
  format: qasm3
  role: target
specification:
  mode: exact
  preconditions:
  - two-qubit scaffold instance
  - qubit ordering declared in artifacts
  postconditions:
  - QFT composed with inverse QFT equals identity on declared register
  invariants: []
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: true
    qubits: '2'
    gates: null
    depth: null
    t_count: null
    t_depth: null
    ancilla: '0'
    measurements: '0'
    other: []
