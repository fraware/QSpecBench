qspecbench_version: '0.2'
id: phase_polynomial_equivalence_small_instance
title: Phase Polynomial Equivalence Small Instance
track: equivalence
domain: circuit_equivalence
claim_type: unitary_equivalence
difficulty: intermediate
informal_claim:
  statement: Two circuits realize the same phase polynomial on a small declared instance.
  source: null
  reference_key: null
semantic_level:
  primary: circuit
  secondary: []
objects:
- name: source
  type: circuit
  path: artifacts/source.qasm
  format: qasm3
  role: source
- name: target
  type: circuit
  path: artifacts/target.qasm
  format: qasm3
  role: target
specification:
  mode: relational
  preconditions:
  - declared qubit ordering
  postconditions:
  - phase polynomials match under declared ordering
  invariants: []
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: false
    qubits: null
    gates: null
    depth: null
    t_count: null
    t_depth: null
    ancilla: null
    measurements: null
    other: []
assumptions:
  mathematical:
  - standard finite-dimensional quantum semantics
  physical: []
  tool: []
  artifact: []
  unverified: []
evidence:
- id: qasm_parse_source
  type: qasm_parse
  path: artifacts/source.qasm
  checker: qasm parser adapter
  command: python adapters/qasm/parse_result.py artifacts/source.qasm
  status: passing
  notes: Syntax only; semantic claim not verified.
- id: qasm_parse_target
  type: qasm_parse
  path: artifacts/target.qasm
  checker: qasm parser adapter
  command: python adapters/qasm/parse_result.py artifacts/target.qasm
  status: passing
  notes: Syntax only; semantic claim not verified.
- id: qcec_equivalence
  type: qcec_result
  path: artifacts/source.qasm
  secondary_path: artifacts/target.qasm
  checker: QCEC equivalence tool
  command: python adapters/qcec/parse_result.py {path} {path2}
  status: passing
  notes: External equivalence check on declared QASM pair.
- id: lean_phase_poly
  type: lean_proof
  path: evidence/phase_polynomial.lean
  checker: Lean 4 kernel
  command: python adapters/lean/parse_result.py evidence/phase_polynomial.lean
  status: passing
  notes: Kernel-checked phase-polynomial scaffold.
- id: bridge_verify
  type: simulation
  path: evidence/bridge_verify.result.json
  checker: verify-bridge CLI
  command: python adapters/bridge/parse_result.py evidence/bridge_verify.result.json
  status: passing
  notes: QASM matrix matches OpenQASM3 denotation (kernel_checked bridge).
trust_boundary:
  checked_by:
  - QASM syntax parse
  - Lean 4 kernel scaffold
  - verify-bridge matrix match
  trusted_kernels:
  - Lean 4 kernel
  trusted_external_tools:
