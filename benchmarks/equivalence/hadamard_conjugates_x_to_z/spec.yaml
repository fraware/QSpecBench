qspecbench_version: "0.1"
id: hadamard_conjugates_x_to_z
title: "Hadamard conjugates X to Z"
track: equivalence
domain: circuit_equivalence
claim_type: unitary_equivalence
difficulty: intermediate

informal_claim:
  statement: "Conjugating Pauli X by H yields Pauli Z up to global phase on one qubit."
  source: null
  reference_key: null

semantic_level:
  primary: circuit
  secondary: ["compiler"]

objects:
  - name: source
    type: circuit
    path: artifacts/source.qasm
    format: qasm3
    role: source
  - name: target
    type: circuit
    path: artifacts/target.qasm
    format: qasm3
    role: target

specification:
  mode: exact
  preconditions:
    - "equivalence up to global phase on one qubit"
    - "source implements H X H; target implements Z"
  postconditions:
    - "source and target unitaries are equal up to global phase"
  invariants: []
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: true
    qubits: "1"
    gates: "H, X, Z"
    depth: null
    t_count: null
    t_depth: null
    ancilla: "0"
    measurements: "0"
    other: []

assumptions:
  mathematical:
    - "standard single-qubit Pauli semantics"
  physical: []
  tool: []
  artifact: []
  unverified: []

acceptable_evidence:
  - type: qasm_parse
    checker: "qasm parser adapter"
    path: null
    required_for_claim: false
    trust_level: externally_trusted
  - type: lean_proof
    checker: "Lean 4 kernel"
    path: null
    required_for_claim: false
    trust_level: checked

evidence:
