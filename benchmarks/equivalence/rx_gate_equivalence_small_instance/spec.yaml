qspecbench_version: '0.2'
id: rx_gate_equivalence_small_instance
title: RX gate equivalence small instance
track: equivalence
domain: circuit_equivalence
claim_type: unitary_equivalence
difficulty: introductory
informal_claim:
  statement: Rx(pi/2) equals H up to global phase on one qubit for the declared instance.
  source: null
  reference_key: null
semantic_level:
  primary: circuit
  secondary: []
objects:
- name: source
  type: circuit
  path: artifacts/source.qasm
  format: qasm3
  role: source
- name: target
  type: circuit
  path: artifacts/target.qasm
  format: qasm3
  role: target
specification:
  mode: exact
  preconditions:
  - equivalence up to global phase
  - parameter pi/2
  postconditions:
  - Rx(pi/2) matches H
  invariants: []
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: false
    qubits: null
    gates: null
    depth: null
    t_count: null
    t_depth: null
    ancilla: null
    measurements: null
    other: []
assumptions:
  mathematical:
  - standard single-qubit semantics
  physical: []
  tool: []
  artifact: []
  unverified: []
acceptable_evidence:
- type: qasm_parse
  checker: qasm parser adapter
  required_for_claim: false
  trust_level: externally_trusted
- type: lean_proof
  checker: Lean 4 kernel
  required_for_claim: false
  trust_level: checked
- type: qcec_result
  checker: QCEC equivalence tool
  required_for_claim: false
  trust_level: externally_trusted
evidence:
- id: lean_rx_pi2
  type: lean_proof
  path: evidence/rx_pi2.lean
  checker: Lean 4 kernel
  command: python adapters/lean/parse_result.py evidence/rx_pi2.lean
  status: passing
  notes: Kernel-checked RX(pi/2) denoted as unnormalized H on int model.
- id: qasm_parse_source
  type: qasm_parse
  path: artifacts/source.qasm
  checker: qasm parser adapter
  command: python adapters/qasm/parse_result.py artifacts/source.qasm
  status: passing
  notes: Syntax only.
- id: qasm_parse_target
  type: qasm_parse
  path: artifacts/target.qasm
  checker: qasm parser adapter
  command: python adapters/qasm/parse_result.py artifacts/target.qasm
  status: passing
  notes: Syntax only.
- id: qcec_equivalence
  type: qcec_result
  path: artifacts/source.qasm
  secondary_path: artifacts/target.qasm
  checker: QCEC equivalence tool
  command: python adapters/qcec/parse_result.py {path} {path2}
  status: passing
  notes: External equivalence check on declared QASM pair.
- id: bridge_verify
  type: simulation
  path: evidence/bridge_verify.result.json
  checker: verify-bridge CLI
  command: python adapters/bridge/parse_result.py evidence/bridge_verify.result.json
  status: passing
  notes: QASM matrix matches OpenQASM3 denotation (kernel_checked bridge).
trust_boundary:
  checked_by:
  - QASM syntax parse
  - Lean 4 kernel RX(pi/2) denotation proof
  - verify-bridge matrix match
  trusted_kernels:
  - Lean 4 kernel
  trusted_external_tools:
  - QCEC
  untrusted_components: []
  assumptions_not_checked:
  - OpenQASM RX parameter semantics beyond pi/2 instance
  - global phase between RX and H
status:
