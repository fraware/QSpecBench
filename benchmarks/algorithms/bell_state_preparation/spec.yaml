qspecbench_version: '0.2'
id: bell_state_preparation
title: Bell state preparation
track: algorithm
domain: quantum_algorithm
claim_type: state_preparation
difficulty: introductory
informal_claim:
  statement: Hadamard on q[0] followed by CNOT prepares the Bell state |Phi+> on two
    qubits.
  source: null
  reference_key: null
semantic_level:
  primary: algorithmic
  secondary:
  - circuit
objects:
- name: circuit
  type: circuit
  path: artifacts/circuit.qasm
  format: qasm3
  role: source
specification:
  mode: exact
  preconditions:
  - standard qubit semantics
  - initial state |00>
  postconditions:
  - output is |Phi+> up to global phase
  invariants: []
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: true
    qubits: '2'
    gates: H, CX
    depth: null
    t_count: '0'
    t_depth: null
    ancilla: '0'
    measurements: '0'
    other: []
assumptions:
  mathematical:
  - standard finite-dimensional quantum semantics
  physical: []
  tool: []
  artifact: []
  unverified: []
acceptable_evidence:
- type: qasm_parse
  checker: qasm parser adapter
  required_for_claim: false
  trust_level: externally_trusted
- type: lean_proof
  checker: Lean 4 kernel
  required_for_claim: false
  trust_level: checked
evidence:
- id: qasm_syntax
  type: qasm_parse
  path: artifacts/circuit.qasm
  checker: qasm parser adapter
  command: python adapters/qasm/parse_result.py artifacts/circuit.qasm
  status: passing
  notes: Syntax only.
- id: lean_bell_prep
  type: lean_proof
  path: evidence/bell_prep.lean
  checker: Lean 4 kernel
  command: python adapters/lean/parse_result.py evidence/bell_prep.lean
  status: passing
  notes: Kernel-checked Bell-pair preparation on fixed 2-qubit matrix model.
- id: bridge_verify
  type: simulation
  path: evidence/bridge_verify.result.json
  checker: verify-bridge CLI
  command: python adapters/bridge/parse_result.py evidence/bridge_verify.result.json
  status: passing
  notes: QASM matrix matches OpenQASM3 denotation (kernel_checked bridge).
trust_boundary:
  checked_by:
  - QASM syntax parse
  - Lean 4 kernel Bell-pair preparation proof
  - verify-bridge matrix match
  trusted_kernels:
  - Lean 4 kernel
  trusted_external_tools: []
  untrusted_components: []
  assumptions_not_checked:
  - OpenQASM H normalization links integer model to gate semantics
  - global phase of |Phi+> state
status:
  informal_claim: complete
  machine_spec: complete
  artifacts: complete
  evidence: partial
  ci: passing
  maturity: reference
references: []
proof_obligations:
- id: lean_kernel_proof
  status: passing
  notes: bell_prep_from_00 on int model
- id: semantic_bridge
  status: passing
  notes: kernel_checked verify-bridge
