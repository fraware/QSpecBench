qspecbench_version: '0.2'
id: teleportation_preserves_state_up_to_pauli_correction
title: Teleportation preserves an unknown qubit up to Pauli correction
track: algorithm
domain: quantum_algorithm
claim_type: protocol_correctness
difficulty: introductory
informal_claim:
  statement: The teleportation circuit transfers an arbitrary one-qubit state to the
    receiver after applying the Pauli correction determined by the two classical measurement
    bits.
  source: null
  reference_key: null
semantic_level:
  primary: algorithmic
  secondary:
  - circuit
  - measurement
  - protocol
objects:
- name: teleportation_circuit
  type: circuit
  path: artifacts/teleportation.qasm
  format: qasm3
  role: source
specification:
  mode: relational
  preconditions:
  - 'profile: fixed-size, exact, relational, non-oracle'
  - 'semantic object: pure-state input/output relation on receiver qubit'
  - 'qubit ordering: q[0]=input, q[1]=Alice Bell, q[2]=Bob Bell'
  - input qubit is an arbitrary normalized pure state
  - shared pair is initialized in the Bell state (|00>+|11>)/sqrt(2)
  postconditions:
  - unitary fragment before measurement matches declared OpenQASM ordering
  - for computational basis inputs, receiver state equals input after Pauli correction (informal; not kernel-checked)
  - sender measurement bits (c[0], c[1]) determine the correction operator (documented, not kernel-checked)
  invariants:
  - no clone of the input state remains with the sender after correction
  approximation:
    enabled: false
    metric: null
    bound: null
  resources:
    enabled: true
    qubits: '3'
    gates: H, CX, measurement, classically controlled Pauli corrections
    depth: null
    t_count: '0'
    t_depth: '0'
    ancilla: '0'
    measurements: '2'
    other: []
assumptions:
  mathematical:
  - standard finite-dimensional qubit semantics
  - ideal gates and projective measurement
  physical: []
  tool: []
  artifact:
  - QASM artifact uses declared qubit ordering
  unverified:
  - classical feed-forward control semantics in QASM
